<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About SSM Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1f2e;
      color: #c9d1e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 6px;
      user-select: none;
      -webkit-user-select: none;
    }
    img { width: 80px; height: 80px; margin-bottom: 8px; }
    h1 { font-size: 20px; font-weight: 700; color: #e2e8f0; }
    .version { font-size: 13px; color: #8892a4; }
    .copyright { font-size: 12px; color: #8892a4; }
    .credits { font-size: 11px; color: #606878; margin-top: 10px; text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <img src="./assets/augmentt_ssm_icon_512.png" alt="">
  <h1>SSM Manager</h1>
  <div class="version" id="version">Version —</div>
  <div class="copyright">© Augmentt</div>
  <div class="credits">
    Manages AWS SSM port-forwarding tunnels.<br>
    Config: ~/.ssm-manager/config.json
  </div>
  <script>
    const v = new URLSearchParams(location.search).get('version')
    if (v) document.getElementById('version').textContent = 'Version ' + v
  </script>
</body>
</html>
